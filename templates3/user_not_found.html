<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Uporabnik ne obstaja</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f9;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h2 {
            color: #d9534f;
        }
        p {
            color: #555;
            margin-bottom: 25px;
        }
        .Gumb {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            color: white;
        }
        .gumb-login {
            background-color: #0275d8;
        }
        .gumb-register {
            background-color: #5cb85c;
        }
        .Gumb:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Ups! Uporabnik ne obstaja 😕</h2>
        <p>V bazi nismo našli nobenega računa s tem uporabniškim imenom. Kaj želiš storiti?</p>
        
        <a href="/login" class="Gumb gumb-login">Poskusi znova (Prijava)</a>
        <a href="/register" class="Gumb gumb-register">Ustvari nov račun (Registracija)</a>
    </div>

</body>
</html>
