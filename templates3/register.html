<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>App 3 - Registracija</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px;">
    <h2>Ustvari račun (App 3)</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Uporabniško ime" style="width: 100%; padding: 8px; margin-bottom: 10px;" required><br>
        <input type="password" name="password" placeholder="Geslo" style="width: 100%; padding: 8px; margin-bottom: 15px;" required><br>
        <button type="submit" style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 3px; cursor: pointer;">Registracija</button>
    </form>
    <p style="text-align: center;"><a href="/login">Že imaš račun? Prijavi se tukaj</a></p>
</body>
</html>
