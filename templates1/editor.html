
<link rel="stylesheet" href="/static1/style.css">
<div class="edit-component" id="editor-{{ note.id }}">
    <input type="text" class="edit-title" value="{{note.title}}">
    <textarea name="content" class="edit-content">{{ note.content }}</textarea>
    <button class="done-btn">Done</button>
    <script>
        $("#editor-{{ note.id }} .done-btn").on("click", function () {
          $.post("/update", {
            id: {{ note.id }},
            content: $("#editor-{{ note.id }} .edit-content").val(),
            title: $("#editor-{{ note.id }} .edit-title").val(),
          }, function () {
            location.reload();
          });
        });
    </script>
</div>
