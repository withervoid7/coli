<h2>Register za app2(soc omrežje)</h2>
<form method="post">
    <input type="text" name="username" placeholder="Username" required><br>
    <input type="password" name="password" placeholder="Password" required><br>

    <label>izberi varnostno vprašanje:</label>
    <select name="sec_q" required>
        <option value="kdo je tvoj najboljši prijatelj?">Kdo je tvoj najboljši prijatelj?</option>
        <option value="kje si se rodil?">Kje si se rodil?</option>
        <option value="kakšna je tvoja najljubša barva?">Kakšna je tvoja najljubša barva?</option>
    </select><br>
    <input type="text" name="sec_a" placeholder="Varnostni odgovor" required><br>

    <button type="submit">Register</button>
</form>
<p><a href="/login">Nazaj na prijavo</a></p>
